<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soma Bone Broth — Production Scheduler</title>
<style>
  :root {
    --dark: #1a1a2e;
    --accent: #4a6741;
    --accent-light: #5a7d4f;
    --bg: #f5f5f0;
    --card-bg: #ffffff;
    --border: #e0e0d8;
    --text: #2a2a2a;
    --text-light: #777;
    --warning: #fff3cd;
    --warning-border: #ffc107;
    --success: #d4edda;
    --error: #f8d7da;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* Header */
  .header {
    background: var(--dark);
    padding: 16px 24px;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 3px solid var(--accent);
  }
  .header h1 {
    color: #fff;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .header p {
    color: #aaa;
    font-size: 13px;
    margin-top: 2px;
  }

  /* Nav tabs */
  .nav {
    display: flex;
    gap: 0;
    background: var(--dark);
    padding: 0 24px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  .nav button {
    background: none;
    border: none;
    color: #aaa;
    padding: 12px 20px;
    font-size: 14px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }
  .nav button:hover { color: #fff; }
  .nav button.active {
    color: #fff;
    border-bottom-color: var(--accent);
  }

  /* Main content */
  .main {
    max-width: 900px;
    margin: 0 auto;
    padding: 24px 16px;
  }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* Cards */
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .card h2 {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 12px;
    color: var(--dark);
  }
  .card h3 {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 8px;
  }

  /* Week picker */
  .week-picker {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .week-picker label {
    font-size: 14px;
    font-weight: 600;
  }
  .week-picker input[type="date"] {
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 14px;
  }

  /* Day blocks */
  .day-block {
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 12px;
    overflow: hidden;
  }
  .day-header {
    background: var(--accent);
    color: #fff;
    padding: 10px 16px;
    font-weight: 600;
    font-size: 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .day-header .date { font-weight: 400; font-size: 13px; opacity: 0.9; }
  .day-header .lot { font-size: 12px; opacity: 0.8; }

  .vessel-row {
    display: grid;
    grid-template-columns: 50px 1fr 100px;
    align-items: center;
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    gap: 12px;
  }
  .vessel-row:last-child { border-bottom: none; }
  .vessel-row:nth-child(even) { background: #fafaf7; }

  .vessel-label {
    font-weight: 700;
    font-size: 14px;
    color: var(--dark);
  }
  .vessel-row select {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 13px;
    background: #fff;
    cursor: pointer;
  }
  .yield-display {
    font-size: 13px;
    color: var(--text-light);
    text-align: center;
  }
  .yield-display.has-value {
    color: var(--accent);
    font-weight: 600;
  }

  /* Notes */
  .notes-area {
    width: 100%;
    min-height: 80px;
    padding: 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 13px;
    font-family: inherit;
    resize: vertical;
  }

  /* Buttons */
  .btn {
    padding: 10px 20px;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { background: var(--accent-light); }
  .btn-primary:disabled {
    background: #ccc;
    cursor: not-allowed;
  }
  .btn-secondary {
    background: var(--dark);
    color: #fff;
  }
  .btn-secondary:hover { background: #2a2a4e; }
  .btn-outline {
    background: none;
    border: 1px solid var(--border);
    color: var(--text);
  }
  .btn-outline:hover { background: #f0f0ea; }

  .btn-block {
    width: 100%;
    padding: 14px;
    font-size: 16px;
  }

  /* Generate button */
  .generate-bar {
    position: sticky;
    bottom: 0;
    background: var(--card-bg);
    border-top: 1px solid var(--border);
    padding: 16px;
    text-align: center;
    box-shadow: 0 -2px 8px rgba(0,0,0,0.05);
  }

  /* PDF list */
  .pdf-list {
    list-style: none;
    padding: 0;
  }
  .pdf-list li {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .pdf-list li:last-child { border-bottom: none; }
  .pdf-list a {
    color: var(--accent);
    text-decoration: none;
    font-weight: 500;
  }
  .pdf-list a:hover { text-decoration: underline; }

  /* History */
  .history-list {
    list-style: none;
    padding: 0;
  }
  .history-list li {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .history-list li:hover { background: #f0f0ea; }
  .history-week { font-weight: 600; }
  .history-meta { font-size: 12px; color: var(--text-light); }

  /* Upload area */
  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: 8px;
    padding: 32px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
  }
  .upload-zone:hover, .upload-zone.dragover {
    border-color: var(--accent);
    background: rgba(74,103,65,0.05);
  }
  .upload-zone p { color: var(--text-light); font-size: 14px; }
  .upload-zone input { display: none; }

  /* Recipe list */
  .recipe-list-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .recipe-name { font-weight: 500; }
  .recipe-meta { font-size: 12px; color: var(--text-light); }

  /* Status messages */
  .status {
    padding: 10px 16px;
    border-radius: 6px;
    margin-bottom: 12px;
    font-size: 13px;
    display: none;
  }
  .status.success { display: block; background: var(--success); color: #155724; }
  .status.error { display: block; background: var(--error); color: #721c24; }
  .status.loading { display: block; background: var(--warning); color: #856404; }

  /* Responsive */
  @media (max-width: 768px) {
    .header h1 { font-size: 17px; }
    .main { padding: 16px 12px; }
    .vessel-row {
      grid-template-columns: 45px 1fr 80px;
      padding: 8px 12px;
      gap: 8px;
    }
    .day-header { padding: 8px 12px; }
    .nav button { padding: 10px 14px; font-size: 13px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>SOMA BONE BROTH</h1>
  <p>Production Scheduler</p>
</div>

<div class="nav">
  <button class="active" onclick="showTab('schedule')">Schedule</button>
  <button onclick="showTab('pdfs')">PDFs</button>
  <button onclick="showTab('recipes')">Recipes</button>
  <button onclick="showTab('history')">History</button>
</div>

<div class="main">

  <!-- SCHEDULE TAB -->
  <div id="tab-schedule" class="tab-content active">
    <div class="card">
      <div class="week-picker">
        <label>Week starting (Monday):</label>
        <input type="date" id="week-date">
        <button class="btn btn-outline" onclick="loadSchedule()">Load</button>
      </div>
    </div>

    <div id="status-msg" class="status"></div>

    <div id="schedule-grid"></div>

    <div class="card">
      <h3>Notes</h3>
      <textarea id="schedule-notes" class="notes-area" placeholder="Weekly notes..."></textarea>
    </div>

    <div class="generate-bar">
      <button class="btn btn-primary btn-block" id="generate-btn" onclick="generatePDFs()">
        Generate Schedule + Checklists
      </button>
    </div>
  </div>

  <!-- PDFS TAB -->
  <div id="tab-pdfs" class="tab-content">
    <div class="card">
      <h2>Generated PDFs</h2>
      <p style="color:var(--text-light);font-size:13px;margin-bottom:12px;">
        Select a week to view its PDFs.
      </p>
      <div class="week-picker" style="margin-bottom:16px;">
        <label>Week:</label>
        <input type="date" id="pdf-week-date">
        <button class="btn btn-outline" onclick="loadPDFs()">Load PDFs</button>
      </div>
      <ul id="pdf-list" class="pdf-list">
        <li style="color:var(--text-light)">No PDFs generated yet</li>
      </ul>
    </div>
  </div>

  <!-- RECIPES TAB -->
  <div id="tab-recipes" class="tab-content">
    <div class="card">
      <h2>Add Recipe</h2>
      <p style="color:var(--text-light);font-size:13px;margin-bottom:16px;">
        Upload a recipe card PDF (same format as your existing cards).
      </p>
      <div class="upload-zone" id="upload-zone">
        <p>Drop PDF here or tap to browse</p>
        <input type="file" id="recipe-upload" accept=".pdf">
      </div>
      <div id="upload-status" class="status" style="margin-top:12px;"></div>
    </div>

    <div class="card">
      <h2>All Recipes (<span id="recipe-count">0</span>)</h2>
      <div id="recipe-list"></div>
    </div>
  </div>

  <!-- HISTORY TAB -->
  <div id="tab-history" class="tab-content">
    <div class="card">
      <h2>Past Schedules</h2>
      <ul id="history-list" class="history-list">
        <li style="color:var(--text-light)">No past schedules</li>
      </ul>
    </div>
  </div>

</div>

<script>
// ── State ──
let recipes = {};
let currentWeekId = '';

// ── Init ──
document.addEventListener('DOMContentLoaded', async () => {
  // Set default week to next Monday
  const today = new Date();
  const day = today.getDay();
  const diff = day === 0 ? 1 : (day === 1 ? 0 : 8 - day);
  const nextMon = new Date(today);
  nextMon.setDate(today.getDate() + diff);
  document.getElementById('week-date').value = formatDate(nextMon);
  document.getElementById('pdf-week-date').value = formatDate(nextMon);

  await loadRecipes();
  buildScheduleGrid();
  loadHistory();
});

function formatDate(d) {
  return d.toISOString().split('T')[0];
}

function getMonday(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const day = d.getDay();
  const diff = d.getDate() - day + (day === 0 ? -6 : 1);
  d.setDate(diff);
  return d;
}

// ── Tabs ──
function showTab(name) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  event.target.classList.add('active');

  if (name === 'recipes') loadRecipeList();
  if (name === 'history') loadHistory();
}

// ── Recipes ──
async function loadRecipes() {
  const res = await fetch('/api/recipes');
  recipes = await res.json();
}

function loadRecipeList() {
  const container = document.getElementById('recipe-list');
  const names = Object.keys(recipes).sort();
  document.getElementById('recipe-count').textContent = names.length;

  if (names.length === 0) {
    container.innerHTML = '<p style="color:var(--text-light)">No recipes loaded</p>';
    return;
  }

  container.innerHTML = names.map(name => {
    const r = recipes[name];
    return `<div class="recipe-list-item">
      <div>
        <div class="recipe-name">${name}</div>
        <div class="recipe-meta">${r.format || ''} · Target: ${r.yield || '—'} units</div>
      </div>
    </div>`;
  }).join('');
}

// ── Upload ──
const uploadZone = document.getElementById('upload-zone');
const uploadInput = document.getElementById('recipe-upload');

uploadZone.addEventListener('click', () => uploadInput.click());
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('dragover');
  if (e.dataTransfer.files.length) uploadRecipe(e.dataTransfer.files[0]);
});
uploadInput.addEventListener('change', () => {
  if (uploadInput.files.length) uploadRecipe(uploadInput.files[0]);
});

async function uploadRecipe(file) {
  const status = document.getElementById('upload-status');
  status.className = 'status loading';
  status.textContent = 'Parsing recipe...';
  status.style.display = 'block';

  const formData = new FormData();
  formData.append('file', file);

  try {
    const res = await fetch('/api/recipes/upload', { method: 'POST', body: formData });
    const data = await res.json();
    if (data.success) {
      status.className = 'status success';
      status.textContent = `Added: ${data.name}`;
      await loadRecipes();
      loadRecipeList();
      // Rebuild schedule grid to include new recipe in dropdowns
      rebuildDropdowns();
    } else {
      status.className = 'status error';
      status.textContent = data.error || 'Failed to parse recipe';
    }
  } catch (e) {
    status.className = 'status error';
    status.textContent = 'Upload failed: ' + e.message;
  }
}

// ── Schedule Grid ──
const DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const VESSELS = ['K1','K2','K3'];

function buildScheduleGrid() {
  const container = document.getElementById('schedule-grid');
  const weekDate = document.getElementById('week-date').value;
  const monday = getMonday(weekDate);
  currentWeekId = formatDate(monday);

  const recipeNames = Object.keys(recipes).sort();
  const options = '<option value="">— No production —</option>' +
    recipeNames.map(n => `<option value="${n}">${n}</option>`).join('');

  let html = '';
  DAYS.forEach((day, idx) => {
    const d = new Date(monday);
    d.setDate(d.getDate() + idx);
    const dateStr = d.toLocaleDateString('en-GB', {day:'2-digit',month:'2-digit',year:'numeric'});
    const lot = d.toLocaleDateString('en-GB',{day:'2-digit',month:'2-digit',year:'2-digit'}).replace(/\//g,'');

    html += `<div class="day-block">
      <div class="day-header">
        <span>${day} — ${dateStr}</span>
        <span class="lot">LOT# ${lot}</span>
      </div>`;

    VESSELS.forEach(v => {
      const id = `sel-${idx}-${v}`;
      const yieldId = `yield-${idx}-${v}`;
      html += `<div class="vessel-row">
        <span class="vessel-label">${v}</span>
        <select id="${id}" onchange="updateYield(${idx},'${v}')">${options}</select>
        <span class="yield-display" id="${yieldId}">—</span>
      </div>`;
    });

    html += '</div>';
  });

  container.innerHTML = html;
}

function rebuildDropdowns() {
  // Save current selections
  const saved = {};
  DAYS.forEach((_, idx) => {
    VESSELS.forEach(v => {
      const sel = document.getElementById(`sel-${idx}-${v}`);
      if (sel) saved[`${idx}-${v}`] = sel.value;
    });
  });

  buildScheduleGrid();

  // Restore selections
  Object.entries(saved).forEach(([key, val]) => {
    const [idx, v] = key.split('-');
    const sel = document.getElementById(`sel-${idx}-${v}`);
    if (sel && val) {
      sel.value = val;
      updateYield(parseInt(idx), v);
    }
  });
}

function updateYield(dayIdx, vessel) {
  const sel = document.getElementById(`sel-${dayIdx}-${vessel}`);
  const yieldEl = document.getElementById(`yield-${dayIdx}-${vessel}`);
  const recipeName = sel.value;

  if (recipeName && recipes[recipeName]) {
    yieldEl.textContent = recipes[recipeName].yield + ' units';
    yieldEl.classList.add('has-value');
  } else {
    yieldEl.textContent = '—';
    yieldEl.classList.remove('has-value');
  }
}

// ── Load existing schedule ──
async function loadSchedule() {
  const weekDate = document.getElementById('week-date').value;
  const monday = getMonday(weekDate);
  currentWeekId = formatDate(monday);
  document.getElementById('week-date').value = currentWeekId;

  buildScheduleGrid();

  try {
    const res = await fetch(`/api/schedule/${currentWeekId}`);
    const data = await res.json();
    if (data.schedule) {
      // Populate dropdowns
      Object.entries(data.schedule).forEach(([dayIdx, vessels]) => {
        Object.entries(vessels).forEach(([vessel, recipe]) => {
          const sel = document.getElementById(`sel-${dayIdx}-${vessel}`);
          if (sel && recipe) {
            sel.value = recipe;
            updateYield(parseInt(dayIdx), vessel);
          }
        });
      });
      if (data.notes) {
        document.getElementById('schedule-notes').value = data.notes;
      }
      showStatus('Schedule loaded', 'success');
    }
  } catch (e) {
    // No existing schedule, that's fine
  }
}

// ── Generate PDFs ──
async function generatePDFs() {
  const btn = document.getElementById('generate-btn');
  btn.disabled = true;
  btn.textContent = 'Generating...';
  showStatus('Generating PDFs...', 'loading');

  // Collect schedule data
  const schedule = {};
  DAYS.forEach((_, idx) => {
    schedule[idx] = {};
    VESSELS.forEach(v => {
      const sel = document.getElementById(`sel-${idx}-${v}`);
      schedule[idx][v] = sel ? sel.value : '';
    });
  });

  const notes = document.getElementById('schedule-notes').value;

  try {
    const res = await fetch('/api/generate', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        week_id: currentWeekId,
        schedule: schedule,
        notes: notes,
      }),
    });
    const data = await res.json();

    if (data.success) {
      showStatus(`Generated ${data.files.length} PDFs`, 'success');
      // Switch to PDFs tab
      document.getElementById('pdf-week-date').value = currentWeekId;
      loadPDFsForWeek(currentWeekId);
      document.querySelectorAll('.nav button')[1].click();
    } else {
      showStatus(data.error || 'Generation failed', 'error');
    }
  } catch (e) {
    showStatus('Error: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Generate Schedule + Checklists';
  }
}

// ── PDF list ──
async function loadPDFs() {
  const weekDate = document.getElementById('pdf-week-date').value;
  const monday = getMonday(weekDate);
  loadPDFsForWeek(formatDate(monday));
}

async function loadPDFsForWeek(weekId) {
  const container = document.getElementById('pdf-list');
  try {
    const res = await fetch(`/api/pdfs/${weekId}`);
    const files = await res.json();
    if (files.length === 0) {
      container.innerHTML = '<li style="color:var(--text-light)">No PDFs for this week</li>';
      return;
    }
    container.innerHTML = files.map(f => `<li>
      <span>${f.replace('.pdf','').replace(/_/g,' ')}</span>
      <a href="/api/pdf/${weekId}/${f}" target="_blank">Download</a>
    </li>`).join('');
  } catch (e) {
    container.innerHTML = '<li style="color:var(--text-light)">Error loading PDFs</li>';
  }
}

// ── History ──
async function loadHistory() {
  const container = document.getElementById('history-list');
  try {
    const res = await fetch('/api/schedules');
    const weeks = await res.json();
    if (weeks.length === 0) {
      container.innerHTML = '<li style="color:var(--text-light)">No past schedules</li>';
      return;
    }
    container.innerHTML = weeks.map(w => {
      const d = new Date(w + 'T00:00:00');
      const label = d.toLocaleDateString('en-US', {month:'long', day:'numeric', year:'numeric'});
      return `<li onclick="loadHistoryWeek('${w}')">
        <span class="history-week">Week of ${label}</span>
        <span class="history-meta">View →</span>
      </li>`;
    }).join('');
  } catch (e) {
    container.innerHTML = '<li style="color:var(--text-light)">Error loading history</li>';
  }
}

function loadHistoryWeek(weekId) {
  document.getElementById('week-date').value = weekId;
  document.querySelectorAll('.nav button')[0].click();
  setTimeout(() => loadSchedule(), 100);
}

// ── Status helper ──
function showStatus(msg, type) {
  const el = document.getElementById('status-msg');
  el.className = 'status ' + type;
  el.textContent = msg;
  if (type === 'success') {
    setTimeout(() => { el.style.display = 'none'; }, 3000);
  }
}
</script>
</body>
</html>
