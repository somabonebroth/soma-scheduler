<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soma Bone Broth — Login</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #1a1a2e;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .login-card {
    background: #fff;
    border-radius: 12px;
    padding: 40px;
    width: 100%;
    max-width: 380px;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }
  .login-card img {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    margin-bottom: 16px;
  }
  .login-card h1 {
    font-size: 20px;
    color: #1a1a2e;
    margin-bottom: 4px;
  }
  .login-card p {
    color: #777;
    font-size: 13px;
    margin-bottom: 24px;
  }
  .login-card input {
    width: 100%;
    padding: 12px 16px;
    border: 1px solid #e0e0d8;
    border-radius: 6px;
    font-size: 15px;
    margin-bottom: 12px;
    text-align: center;
  }
  .login-card input:focus {
    outline: none;
    border-color: #4a6741;
  }
  .login-card button {
    width: 100%;
    padding: 12px;
    background: #4a6741;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  .login-card button:hover { background: #5a7d4f; }
  .error {
    color: #dc3545;
    font-size: 13px;
    margin-top: 8px;
    display: none;
  }
</style>
</head>
<body>
<div class="login-card">
  <img src="/static/logo.jpg" alt="Soma">
  <h1>SOMA BONE BROTH</h1>
  <p>Production Scheduler</p>
  <input type="password" id="password" placeholder="Enter password" onkeydown="if(event.key==='Enter')doLogin()">
  <button onclick="doLogin()">Log In</button>
  <div class="error" id="error-msg">Incorrect password</div>
</div>
<script>
async function doLogin() {
  const pw = document.getElementById('password').value;
  const res = await fetch('/api/login', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({password: pw}),
  });
  if (res.ok) {
    window.location.href = '/';
  } else {
    document.getElementById('error-msg').style.display = 'block';
  }
}
</script>
</body>
</html>
